name: Build & Package

# ── Triggers ──────────────────────────────────────────────────────────────────
# push to main  → build + upload artifact (no release)
# push tag v*   → build + upload artifact + create GitHub Release
on:
  push:
    branches: [main, master]
    tags:     ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.0.0)'
        required: false
        default: ''

# ── Shared env ────────────────────────────────────────────────────────────────
env:
  SDK_DIR: contrlSDK

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # Job 1: Build + package .deb
  # ════════════════════════════════════════════════════════════════════════════
  build:
    name: Build deb (Ubuntu 22.04 / amd64)
    runs-on: ubuntu-22.04

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Resolve version ─────────────────────────────────────────────────────
      # Priority: workflow_dispatch input > git tag > commit short sha
      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VER="${{ github.ref_name }}"
            VER="${VER#v}"   # strip leading 'v'
          else
            VER="0.0.0-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VER}"

      # ── System dependencies ─────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            g++ make cmake \
            python3-dev python3-pip \
            dpkg-dev
          pip3 install --quiet pybind11

      # ── Build + package ─────────────────────────────────────────────────────
      - name: Build and package .deb
        run: |
          cd ${{ env.SDK_DIR }}
          bash scripts/make_deb.sh ${{ steps.ver.outputs.version }}

      # ── Smoke test: install and import ──────────────────────────────────────
      - name: Install and smoke-test
        run: |
          cd ${{ env.SDK_DIR }}
          VER=${{ steps.ver.outputs.version }}
          ARCH=$(dpkg --print-architecture)

          # Install C SDK runtime
          sudo dpkg -i "marvin-sdk_${VER}_${ARCH}.deb"

          # Install Python extension
          sudo dpkg -i "python3-marvin-sdk_${VER}_${ARCH}.deb"

          # Verify Python import (no robot connected, just check the module loads)
          python3 - <<'EOF'
          import marvin_sdk as sdk
          print(f"marvin_sdk imported OK")
          print(f"  ArmState.POSITION = {sdk.ArmState.POSITION}")
          print(f"  ArmState.TORQ     = {sdk.ArmState.TORQ}")
          d = sdk.DCSS()
          print(f"  DCSS() created OK, states count = {len(d.states)}")
          p = sdk.CPointSet()
          p.init(7)
          print(f"  CPointSet(7) created OK")
          EOF

      # ── Upload artifact ─────────────────────────────────────────────────────
      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: marvin-sdk-deb-${{ steps.ver.outputs.version }}
          path: ${{ env.SDK_DIR }}/*.deb
          retention-days: 30

      # ── Expose deb paths for release job ────────────────────────────────────
      - name: Set deb paths output
        id: debs
        run: |
          cd ${{ env.SDK_DIR }}
          VER=${{ steps.ver.outputs.version }}
          ARCH=$(dpkg --print-architecture)
          echo "c_deb=contrlSDK/marvin-sdk_${VER}_${ARCH}.deb"           >> "$GITHUB_OUTPUT"
          echo "py_deb=contrlSDK/python3-marvin-sdk_${VER}_${ARCH}.deb"  >> "$GITHUB_OUTPUT"

    outputs:
      version: ${{ steps.ver.outputs.version }}
      c_deb:   ${{ steps.debs.outputs.c_deb }}
      py_deb:  ${{ steps.debs.outputs.py_deb }}

  # ════════════════════════════════════════════════════════════════════════════
  # Job 2: GitHub Release (only on version tags)
  # ════════════════════════════════════════════════════════════════════════════
  release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write   # needed to create releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deb artifacts
        uses: actions/download-artifact@v4
        with:
          name: marvin-sdk-deb-${{ needs.build.outputs.version }}
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Marvin SDK v${{ needs.build.outputs.version }}"
          body: |
            ## Marvin Robot Control SDK v${{ needs.build.outputs.version }}

            ### Packages
            | File | Contents |
            |------|---------|
            | `marvin-sdk_*.deb` | `libMarvinSDK.so` + C++ headers |
            | `python3-marvin-sdk_*.deb` | Python extension (standalone) |

            ### Install
            ```bash
            # C++ runtime + headers
            sudo dpkg -i marvin-sdk_*.deb

            # Python extension
            sudo dpkg -i python3-marvin-sdk_*.deb

            # Verify
            python3 -c "import marvin_sdk; print('OK')"
            ```
          files: dist/*.deb
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ════════════════════════════════════════════════════════════════════════════
  # Job 3: Deploy to robot (optional, only on main branch, manual trigger)
  #
  # Required GitHub Secrets:
  #   ROBOT_SSH_HOST    — target machine IP/hostname
  #   ROBOT_SSH_USER    — SSH user (e.g. ubuntu)
  #   ROBOT_SSH_KEY     — private key (PEM, no passphrase)
  #
  # To enable: uncomment this job and set the secrets in repo Settings.
